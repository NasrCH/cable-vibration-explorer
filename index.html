<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Allure statique d'un câble incliné</title>
<style>
  :root {
    --bg: #faf9f5;
    --surface: #ffffff;
    --surface-1: #f1efe8;
    --border: #e0ded4;
    --border-strong: #c9c7bc;
    --text-primary: #1a1a18;
    --text-secondary: #5f5e5a;
    --text-muted: #888780;
    --accent: #534AB7;
    --radius: 8px;
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #262624;
      --surface: #30302e;
      --surface-1: #3a3a37;
      --border: #45443f;
      --border-strong: #5a594f;
      --text-primary: #f5f4ef;
      --text-secondary: #b4b2a9;
      --text-muted: #888780;
      --accent: #7f77dd;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text-primary);
    font-family: var(--font-sans); line-height: 1.6; padding: 2rem 1rem;
  }
  .container { max-width: 780px; margin: 0 auto; }
  h1 { font-size: 22px; font-weight: 500; margin: 0 0 4px; }
  h2 { font-size: 16px; font-weight: 500; margin: 1.75rem 0 0.75rem; }
  .subtitle { color: var(--text-secondary); font-size: 15px; margin: 0 0 1.5rem; }

  .panel { background: var(--surface-1); border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1.25rem; }

  .row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .row .name { font-family: var(--font-mono); font-size: 14px; font-weight: 500; min-width: 132px; }
  .row .name .u { font-size: 11px; color: var(--text-muted); font-family: var(--font-sans); }
  .row .ctl { flex: 1; display: flex; align-items: center; gap: 10px; }
  input[type="range"] {
    flex: 1; -webkit-appearance: none; appearance: none; height: 4px;
    border-radius: 2px; background: var(--border-strong); outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none; width: 18px; height: 18px;
    border-radius: 50%; background: var(--accent); cursor: pointer;
  }
  input[type="range"]::-moz-range-thumb {
    width: 18px; height: 18px; border: none; border-radius: 50%; background: var(--accent); cursor: pointer;
  }
  .row input.num {
    font-family: var(--font-mono); font-size: 13px; text-align: right;
    background: var(--surface); color: var(--text-primary);
    border: 0.5px solid var(--border); border-radius: 6px; padding: 4px 8px; width: 100px;
  }
  .rng-cfg { font-size: 11px; color: var(--text-muted); display: flex; gap: 6px; align-items: center; }
  .rng-cfg input { width: 62px; font-family: var(--font-mono); font-size: 11px; text-align: right;
    background: var(--surface); color: var(--text-secondary); border: 0.5px solid var(--border); border-radius: 4px; padding: 2px 4px; }

  .derived { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 8px 20px; }
  .derived .d { display: flex; justify-content: space-between; gap: 10px; font-size: 13px; padding: 3px 0; border-bottom: 0.5px solid var(--border); }
  .derived .d .dl { color: var(--text-secondary); }
  .derived .d .dv { font-family: var(--font-mono); }

  .plot-wrap { background: var(--surface-1); border-radius: 12px; padding: 12px; }
  svg { display: block; height: auto; width: 100%; }
  .note { font-size: 13px; color: var(--text-muted); margin-top: 1.25rem; }
  .note strong { color: var(--text-secondary); font-weight: 500; }
  .refs { font-size: 12px; color: var(--text-muted); margin-top: 1rem; }
  .refs li { margin-bottom: 3px; }
</style>
</head>
<body>
<div class="container">
  <h1>Allure statique d'un câble incliné</h1>
  <p class="subtitle">Forme d'équilibre d'un câble incliné sous son poids propre (solution caténaire). Trace l'allure du câble entre ses deux ancrages.</p>

  <h2>Paramètres</h2>
  <div id="params"></div>

  <h2>Grandeurs dérivées</h2>
  <div class="panel"><div class="derived" id="derived"></div></div>

  <h2>Allure du câble</h2>
  <div class="plot-wrap">
    <svg id="svg" viewBox="0 0 640 260" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>

  <p class="note" id="note"></p>

  <ul class="refs">
    <li>H.M. Irvine, <em>Cable Structures</em>, MIT Press, 1981.</li>
  </ul>
</div>

<script>
(function(){
  "use strict";

  var G = 9.81; // m/s^2, gravitational acceleration used for cable weight
  var ACCENT = "#534AB7";
  function g(id){ return document.getElementById(id); }

  function fmt(x){
    if(x === null || x === undefined || !isFinite(x)) return "—";
    var a = Math.abs(x);
    if(a !== 0 && (a < 1e-3 || a >= 1e5)) return x.toExponential(3);
    return x.toFixed(3);
  }

  // ---------- Parameters ----------
  // L = chord length between anchorages; alpha = chord inclination; mu = mass/length; H = horizontal tension.
  var PARAM_SPECS = [
    {key:"L",     label:"L",  unit:"m (corde)",         val:120, min:5,   max:500, step:1},
    {key:"alpha", label:"α", unit:"° (inclinaison)",   val:30,  min:0,   max:75,  step:1},
    {key:"mu",    label:"μ", unit:"kg/m",              val:50,  min:1,   max:300, step:1},
    {key:"H",     label:"H",  unit:"N",                 val:3e6, min:1e4, max:1e7, step:1e4}
  ];
  var params = {}; // key -> {val,min,max,step,unit,label}
  PARAM_SPECS.forEach(function(s){
    params[s.key] = { key:s.key, label:s.label, unit:s.unit, val:s.val, min:s.min, max:s.max, step:s.step };
  });

  // ---------- Static equilibrium of an inclined cable under self-weight ----------
  // Catenary solution (eqs 1.4-1.6): Y(X)/l = (1/tau)[cosh C1 - cosh(C1 - tau X/l)],
  // tau = mu*g*l/H, C = (tau e^tau/(e^tau-1)) tan a, C1 = ln(C + sqrt(C^2+e^tau)).
  // l = L cos a is the horizontal span; Y is measured downward from the upper anchorage.
  function compute(){
    var L = params.L.val, a = params.alpha.val * Math.PI / 180, mu = params.mu.val, H = params.H.val;
    var l = L * Math.cos(a), w = mu * G, tanA = Math.tan(a);
    var tau = w * l / H;
    var eT = Math.exp(tau);
    var C = (tau * eT / (eT - 1)) * tanA;
    var C1 = Math.log(C + Math.sqrt(C * C + eT));
    function Yv(X){ return (l / tau) * (Math.cosh(C1) - Math.cosh(C1 - tau * X / l)); }
    var steps = 240, pts = [], maxSag = 0, xSag = 0;
    for(var i = 0; i <= steps; i++){
      var X = l * i / steps, y = Yv(X), sag = y - X * tanA;
      pts.push({ X: X, Y: y });
      if(sag > maxSag){ maxSag = sag; xSag = X; }
    }
    var arc = (l / tau) * (Math.sinh(C1) - Math.sinh(C1 - tau)); // total cable length
    var Tmax = H / Math.cos(a);                                  // along-chord equivalent thrust
    return {
      profile: { pts: pts, l: l, tanA: tanA, maxSag: maxSag },
      derived: [
        {lbl:"τ = μg·l/H", val: fmt(tau), unit:"—"},
        {lbl:"Portée horizontale l = L·cos α", val: fmt(l), unit:"m"},
        {lbl:"Flèche verticale max", val: fmt(maxSag), unit:"m"},
        {lbl:"Position flèche max", val: (l ? (xSag / l * 100).toFixed(1) : "—"), unit:"% portée"},
        {lbl:"Longueur du câble (arc)", val: fmt(arc), unit:"m"},
        {lbl:"Allongement arc/corde", val: ((arc / L - 1) * 100).toFixed(3), unit:"%"},
        {lbl:"Poussée équivalente T = H/cos α", val: fmt(Tmax), unit:"N"},
        {lbl:"Dénivelé des appuis", val: fmt(l * tanA), unit:"m"}
      ],
      note: "Allure statique d'un câble incliné sous poids propre (solution caténaire, éq. 1.4-1.6) : "
        + "<strong>Y(X)/l = (1/τ)·[cosh C₁ − cosh(C₁ − τX/l)]</strong>, τ = μg·l/H, "
        + "C₁ = ln(C + √(C²+e^τ)), C = (τe^τ/(e^τ−1))·tan α. "
        + "L est la longueur de corde (entre ancrages), l = L·cos α la portée horizontale, α l'inclinaison. "
        + "<strong>Le tracé conserve l'angle réel de la corde ; la flèche est exagérée pour la lisibilité (facteur indiqué)</strong> — la valeur réelle est en « Flèche verticale max ». "
        + "Hypothèses : profil d'équilibre sous poids propre uniforme, câble inextensible en géométrie, sans charge ponctuelle. (g = " + G + " m/s²)"
    };
  }

  // ---------- Parameter UI ----------
  function buildParamsUI(){
    var host = g("params");
    host.innerHTML = "";
    PARAM_SPECS.forEach(function(spec){
      var p = params[spec.key], key = spec.key;
      var row = document.createElement("div");
      row.className = "row";
      row.innerHTML =
        '<span class="name">' + p.label + (p.unit ? ' <span class="u">' + p.unit + '</span>' : '') + '</span>'
      + '<div class="ctl">'
      +   '<input type="range" data-var="' + key + '" data-role="slider" min="' + p.min + '" max="' + p.max + '" step="' + p.step + '" value="' + p.val + '">'
      +   '<input class="num" type="number" data-var="' + key + '" data-role="num" step="' + p.step + '" value="' + p.val + '">'
      + '</div>'
      + '<div class="rng-cfg">min<input type="number" data-var="' + key + '" data-role="min" value="' + p.min + '">'
      +   'max<input type="number" data-var="' + key + '" data-role="max" value="' + p.max + '"></div>';
      host.appendChild(row);
    });
    host.querySelectorAll("input").forEach(function(inp){
      inp.addEventListener("input", function(){
        var key = inp.getAttribute("data-var"), role = inp.getAttribute("data-role");
        var p = params[key], v = parseFloat(inp.value);
        if(isNaN(v)) return;
        if(role === "slider" || role === "num"){
          p.val = v;
          if(v > p.max) p.max = v;   // auto-expand so the slider never contradicts the value
          if(v < p.min) p.min = v;
        } else if(role === "min"){ p.min = v; }
        else if(role === "max"){ p.max = v; }
        syncRow(key);
        refresh();
      });
    });
  }

  function syncRow(key){
    var p = params[key], host = g("params");
    var slider = host.querySelector('input[data-role="slider"][data-var="' + key + '"]');
    var num = host.querySelector('input[data-role="num"][data-var="' + key + '"]');
    var minI = host.querySelector('input[data-role="min"][data-var="' + key + '"]');
    var maxI = host.querySelector('input[data-role="max"][data-var="' + key + '"]');
    if(slider){ slider.min = p.min; slider.max = p.max; slider.value = p.val; }
    if(num && document.activeElement !== num){ num.value = p.val; }
    if(minI && document.activeElement !== minI){ minI.value = p.min; }
    if(maxI && document.activeElement !== maxI){ maxI.value = p.max; }
  }

  // ---------- Render ----------
  function refresh(){
    var res = compute();
    var dh = "";
    res.derived.forEach(function(d){
      dh += '<div class="d"><span class="dl">' + d.lbl + '</span><span class="dv">' + d.val + (d.unit ? ' ' + d.unit : '') + '</span></div>';
    });
    g("derived").innerHTML = dh;
    g("note").innerHTML = res.note;
    drawProfile(res.profile);
  }

  // Chord angle is drawn true (uniform scale); the sag below the chord is exaggerated
  // by a labelled factor so it stays visible at realistic span/sag ratios.
  function drawProfile(prof){
    var W = 640, H = 260, pad = 34;
    var l = prof.l, tanA = prof.tanA, pts = prof.pts, maxSag = prof.maxSag;
    if(!(l > 0) || pts.length === 0){ g("svg").innerHTML = ""; return; }
    var K = 1;
    if(maxSag > 1e-9){ K = Math.min(500, Math.max(1, 0.18 * l / maxSag)); }
    function ydisp(p){ var chord = p.X * tanA; return chord + K * (p.Y - chord); }
    var yMin = 0, yMax = 0;
    pts.forEach(function(p){ var y = ydisp(p); if(y < yMin) yMin = y; if(y > yMax) yMax = y; });
    var spanY = Math.max(yMax - yMin, 1e-6);
    var scale = Math.min((W - 2 * pad) / l, (H - 2 * pad) / spanY);
    var offX = (W - l * scale) / 2, offY = (H - spanY * scale) / 2;
    function sx(X){ return offX + X * scale; }
    function sy(y){ return offY + (y - yMin) * scale; }

    var parts = [];
    parts.push('<line x1="' + sx(0).toFixed(1) + '" y1="' + sy(ydisp(pts[0])).toFixed(1)
      + '" x2="' + sx(l).toFixed(1) + '" y2="' + sy(ydisp(pts[pts.length-1])).toFixed(1)
      + '" stroke="#999" stroke-width="1" stroke-dasharray="5 4"/>');
    var poly = pts.map(function(p){ return sx(p.X).toFixed(1) + ',' + sy(ydisp(p)).toFixed(1); });
    parts.push('<polyline points="' + poly.join(' ') + '" fill="none" stroke="' + ACCENT + '" stroke-width="2.5"/>');
    [{X:0, lab:"A"}, {X:l, lab:"B"}].forEach(function(a, i){
      var p = (i === 0) ? pts[0] : pts[pts.length-1];
      var cx = sx(a.X), cy = sy(ydisp(p));
      parts.push('<circle cx="' + cx.toFixed(1) + '" cy="' + cy.toFixed(1) + '" r="4" fill="#888"/>');
      parts.push('<text x="' + cx.toFixed(1) + '" y="' + (cy + (i === 0 ? -10 : 18)).toFixed(1)
        + '" font-size="12" fill="#888" text-anchor="middle" font-family="sans-serif">' + a.lab + '</text>');
    });
    var kLabel = (K > 1.05) ? ("flèche ×" + (K >= 10 ? Math.round(K) : K.toFixed(1)) + " (exagérée)") : "échelle réelle";
    parts.push('<text x="' + (W - pad) + '" y="18" font-size="11" fill="#888" text-anchor="end" font-family="sans-serif">' + kLabel + '</text>');
    g("svg").innerHTML = parts.join('');
  }

  // ---------- Start ----------
  buildParamsUI();
  refresh();
})();
</script>
</body>
</html>
